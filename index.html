<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key System - Bear Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .lock-icon {
            font-size: 64px;
            margin-bottom: 20px;
            display: block;
        }
        h1 {
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 15px;
            margin-bottom: 30px;
        }
        .status-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .status-box .label {
            color: #94a3b8;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .status-box .value {
            color: #fff;
            font-size: 22px;
            font-weight: 600;
        }
        .status-box .value .highlight {
            color: #facc15;
        }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            width: 100%;
            color: #0a0a1a;
        }
        .btn-primary {
            background: linear-gradient(135deg, #facc15, #f59e0b);
            box-shadow: 0 4px 15px rgba(250, 204, 21, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(250, 204, 21, 0.4);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        .btn-success {
            background: linear-gradient(135deg, #4ade80, #22c55e);
            box-shadow: 0 4px 15px rgba(74, 222, 128, 0.3);
            color: #0a0a1a;
        }
        .key-display {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 14px;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
            font-size: 18px;
            font-weight: 600;
            color: #facc15;
            border: 1px dashed rgba(250, 204, 21, 0.3);
            word-break: break-all;
        }
        .error-message {
            color: #f87171;
            font-size: 14px;
            margin-top: 12px;
            padding: 10px;
            background: rgba(248, 113, 113, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(248, 113, 113, 0.2);
        }
        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #475569;
        }
        .footer a {
            color: #64748b;
            text-decoration: none;
        }
        .footer a:hover {
            color: #94a3b8;
            text-decoration: underline;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="container" id="app">
        <span class="lock-icon">🔑</span>
        <h1>BEAR KEY SYSTEM</h1>
        <p class="subtitle">Nhận key truy cập độc quyền</p>

        <!-- Trạng thái -->
        <div class="status-box">
            <div class="label">Trạng thái</div>
            <div class="value" id="statusText">
                <span class="highlight">⏳</span> Đang kiểm tra...
            </div>
        </div>

        <!-- Key hiển thị -->
        <div id="keyDisplay" class="key-display hidden">
            <!-- Key sẽ hiển thị ở đây -->
        </div>

        <!-- Nút hành động -->
        <button id="actionBtn" class="btn btn-primary" disabled>
            Đang tải...
        </button>

        <!-- Thông báo lỗi -->
        <div id="errorMessage" class="error-message hidden"></div>

        <div class="footer">
            <span>🔒 Bảo mật &amp; giới hạn 1 key/phiên</span>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ----- CẤU HÌNH -----
            const CONFIG = {
                // Trang web nguồn cho phép (cần chính xác tuyệt đối)
                ALLOWED_REFERRER: 'https://pro.tapvietcode.com/bi-kip-on-thi-trac-nghiem-hieu-qua-day-du-nhanh-nhat-cho-sinh-vien/',
                // Link đích khi bấm "Get Key"
                TARGET_URL: 'https://link4sub.com/DaPSaLCo2S',
                // Thời gian chờ reset (1 giờ = 3600000 ms)
                RESET_TIME: 3600000,
            };

            // ----- DOM REFS -----
            const statusText = document.getElementById('statusText');
            const keyDisplay = document.getElementById('keyDisplay');
            const actionBtn = document.getElementById('actionBtn');
            const errorMessage = document.getElementById('errorMessage');

            // ----- STATE -----
            let keyData = null; // Lưu key và thời gian tạo
            let timerInterval = null;

            // ----- UTILITY -----
            function showError(msg) {
                errorMessage.textContent = msg;
                errorMessage.classList.remove('hidden');
            }

            function hideError() {
                errorMessage.classList.add('hidden');
            }

            function updateStatus(text, isHighlight = false) {
                statusText.innerHTML = isHighlight ?
                    `<span class="highlight">${text}</span>` :
                    text;
            }

            function setButton(text, disabled = false, className = 'btn-primary') {
                actionBtn.textContent = text;
                actionBtn.disabled = disabled;
                actionBtn.className = `btn ${className}`;
            }

            function displayKey(key) {
                keyDisplay.textContent = key;
                keyDisplay.classList.remove('hidden');
            }

            function hideKey() {
                keyDisplay.classList.add('hidden');
            }

            // ----- LOGIC CHÍNH -----

            // 1. Kiểm tra Referrer
            function checkReferrer() {
                const referrer = document.referrer;
                // So sánh chính xác (bao gồm cả dấu "/" cuối)
                return referrer === CONFIG.ALLOWED_REFERRER;
            }

            // 2. Tạo key ngẫu nhiên
            function generateKey() {
                const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
                let key = 'KEY-';
                for (let i = 0; i < 10; i++) {
                    key += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                return key;
            }

            // 3. Lưu key vào sessionStorage
            function saveKeyToSession(key) {
                keyData = {
                    value: key,
                    timestamp: Date.now()
                };
                try {
                    sessionStorage.setItem('bear_key_data', JSON.stringify(keyData));
                } catch (e) {
                    // Bỏ qua lỗi storage
                }
            }

            // 4. Đọc key từ sessionStorage
            function loadKeyFromSession() {
                try {
                    const raw = sessionStorage.getItem('bear_key_data');
                    if (!raw) return null;
                    const data = JSON.parse(raw);
                    if (data && data.value && data.timestamp) {
                        return data;
                    }
                    return null;
                } catch (e) {
                    return null;
                }
            }

            // 5. Xóa key khỏi sessionStorage
            function clearKeyFromSession() {
                try {
                    sessionStorage.removeItem('bear_key_data');
                } catch (e) { /* bỏ qua */ }
                keyData = null;
            }

            // 6. Kiểm tra key còn hiệu lực (trong vòng 1 tiếng)
            function isKeyValid(data) {
                if (!data) return false;
                const now = Date.now();
                return (now - data.timestamp) < CONFIG.RESET_TIME;
            }

            // 7. Xử lý khi key hết hạn hoặc không có key
            function handleNoValidKey() {
                hideKey();
                clearKeyFromSession();

                const isFromAllowedSite = checkReferrer();

                if (isFromAllowedSite) {
                    // Cho phép lấy key mới
                    updateStatus('✅ Sẵn sàng nhận key', true);
                    setButton('🎯 Get Key', false, 'btn-primary');
                    hideError();
                } else {
                    // Không cho phép
                    updateStatus('⛔ Truy cập bị từ chối', false);
                    setButton('🚫 Không thể lấy key', true, 'btn-secondary');
                    showError('⚠️ Vui lòng truy cập từ trang web chính thức để nhận key.');
                }
            }

            // 8. Xử lý khi có key hợp lệ
            function handleValidKey(keyVal) {
                displayKey(keyVal);
                updateStatus('🔑 Key đã sẵn sàng', true);
                setButton('📋 Copy Key & Tiếp tục', false, 'btn-success');
                hideError();

                // Lưu lại để đồng bộ
                if (!keyData || keyData.value !== keyVal) {
                    saveKeyToSession(keyVal);
                }
            }

            // 9. Reset trạng thái (khi hết hạn hoặc lỗi)
            function resetState() {
                if (timerInterval) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                }
                clearKeyFromSession();
                handleNoValidKey();
            }

            // 10. Xử lý sự kiện "Get Key" / "Copy Key"
            function handleAction() {
                const currentText = actionBtn.textContent;

                // Nếu là nút "Get Key"
                if (currentText.includes('Get Key')) {
                    // Kiểm tra lại referrer (phòng trường hợp bị lách)
                    if (!checkReferrer()) {
                        handleNoValidKey(); // reset và báo lỗi
                        return;
                    }

                    // Tạo key mới
                    const newKey = generateKey();
                    saveKeyToSession(newKey);
                    handleValidKey(newKey);

                    // Chuyển hướng sau 1.5 giây
                    setTimeout(() => {
                        window.location.href = CONFIG.TARGET_URL;
                    }, 1500);

                    return;
                }

                // Nếu là nút "Copy Key & Tiếp tục"
                if (currentText.includes('Copy Key')) {
                    const key = keyData ? keyData.value : null;
                    if (key) {
                        // Copy vào clipboard
                        if (navigator.clipboard && navigator.clipboard.writeText) {
                            navigator.clipboard.writeText(key).catch(() => {
                                // Fallback
                                copyFallback(key);
                            });
                        } else {
                            copyFallback(key);
                        }
                        // Chuyển hướng
                        setTimeout(() => {
                            window.location.href = CONFIG.TARGET_URL;
                        }, 500);
                    } else {
                        // Nếu không có key, reset
                        resetState();
                    }
                    return;
                }

                // Fallback: reset
                resetState();
            }

            // Fallback copy
            function copyFallback(text) {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand('copy');
                } catch (e) { /* bỏ qua */ }
                document.body.removeChild(textarea);
            }

            // 11. Khởi tạo và kiểm tra trạng thái
            function init() {
                // Kiểm tra key đã lưu trong session
                const saved = loadKeyFromSession();

                if (saved && isKeyValid(saved)) {
                    // Có key hợp lệ
                    handleValidKey(saved.value);

                    // Thiết lập timer kiểm tra hết hạn
                    const remaining = CONFIG.RESET_TIME - (Date.now() - saved.timestamp);
                    if (remaining > 0) {
                        timerInterval = setTimeout(() => {
                            resetState();
                        }, remaining);
                    } else {
                        resetState();
                    }
                } else {
                    // Không có key hoặc key hết hạn
                    // Xóa key cũ nếu có
                    if (saved) {
                        clearKeyFromSession();
                    }
                    handleNoValidKey();
                }

                // Gán sự kiện cho nút
                actionBtn.addEventListener('click', handleAction);
            }

            // 12. Chạy
            init();

            // 13. Xử lý khi trang bị đóng / tải lại
            window.addEventListener('beforeunload', function() {
                if (timerInterval) {
                    clearTimeout(timerInterval);
                }
            });

        })();
    </script>

</body>
</html>
