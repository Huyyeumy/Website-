<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            text-align: center;
        }
        .lock-icon {
            font-size: 64px;
            margin-bottom: 20px;
            display: block;
        }
        h1 {
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 15px;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            padding: 16px 32px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            width: 100%;
            color: #0a0a1a;
            background: linear-gradient(135deg, #facc15, #f59e0b);
            box-shadow: 0 4px 15px rgba(250, 204, 21, 0.3);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(250, 204, 21, 0.4);
        }
        .btn:active {
            transform: scale(0.98);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        .btn-success {
            background: linear-gradient(135deg, #4ade80, #22c55e);
            box-shadow: 0 4px 15px rgba(74, 222, 128, 0.3);
        }
        .btn-success:hover {
            box-shadow: 0 8px 25px rgba(74, 222, 128, 0.4);
        }
        .key-display {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 14px;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
            font-size: 18px;
            font-weight: 600;
            color: #facc15;
            border: 1px dashed rgba(250, 204, 21, 0.3);
            word-break: break-all;
            user-select: all;
        }
        .key-display .label {
            display: block;
            font-size: 12px;
            color: #94a3b8;
            font-family: 'Segoe UI', system-ui, sans-serif;
            font-weight: 400;
            margin-bottom: 6px;
        }
        .hidden {
            display: none !important;
        }
        .copy-hint {
            font-size: 12px;
            color: #64748b;
            margin-top: 8px;
        }
        .status-msg {
            font-size: 14px;
            color: #94a3b8;
            margin: 15px 0;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }
        .status-msg .highlight {
            color: #facc15;
            font-weight: 600;
        }
        .status-msg .success {
            color: #4ade80;
            font-weight: 600;
        }
        .status-msg .error {
            color: #f87171;
            font-weight: 600;
        }
        .timer-info {
            font-size: 13px;
            color: #64748b;
            margin-top: 15px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
        }
        .timer-info span {
            color: #facc15;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">
        <span class="lock-icon">🔑</span>
        <h1>KEY SYSTEM</h1>
        <p class="subtitle">Nhấn nút bên dưới để nhận key</p>

        <div id="statusMsg" class="status-msg">
            ⏳ Đang kiểm tra...
        </div>

        <div id="keyDisplay" class="key-display hidden">
            <span class="label">🔑 KEY CỦA BẠN</span>
            <span id="keyValue"></span>
        </div>

        <button id="getKeyBtn" class="btn">
            🎯 Get Key
        </button>

        <div class="copy-hint" id="copyHint">💡 Click vào key để copy</div>

        <div class="timer-info" id="timerInfo">
            ⏰ Key mới lúc: <span id="nextResetTime">--:--</span>
        </div>
    </div>

    <script>
        // ===== DOM =====
        const getKeyBtn = document.getElementById('getKeyBtn');
        const keyDisplay = document.getElementById('keyDisplay');
        const keyValue = document.getElementById('keyValue');
        const copyHint = document.getElementById('copyHint');
        const statusMsg = document.getElementById('statusMsg');
        const nextResetTime = document.getElementById('nextResetTime');

        // ===== CẤU HÌNH =====
        const STORAGE_KEY = 'daily_key_data';
        const KEYS_URL = 'https://raw.githubusercontent.com/Huyyeumy/Website-/refs/heads/main/Keys.json';

        // ===== STATE =====
        let keysData = null;
        let keyData = null;
        let countdownInterval = null;

        // ===== LẤY NGÀY HIỆN TẠI =====
        function getToday() {
            return new Date().toISOString().split('T')[0];
        }

        // ===== LẤY GIỜ HIỆN TẠI (giờ:phút) =====
        function getCurrentHourMinute() {
            const now = new Date();
            return now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0');
        }

        // ===== TÍNH THỜI GIAN ĐẾN GIỜ CHẴN TIẾP THEO =====
        function getNextHourReset() {
            const now = new Date();
            const next = new Date(now);
            next.setHours(now.getHours() + 1, 0, 0, 0);
            return next;
        }

        // ===== TÍNH THỜI GIAN ĐẾN 00:00 =====
        function getNextMidnight() {
            const now = new Date();
            const next = new Date(now);
            next.setDate(now.getDate() + 1);
            next.setHours(0, 0, 0, 0);
            return next;
        }

        // ===== LẤY KEY TỪ FILE JSON =====
        async function loadKeysData() {
            try {
                const response = await fetch(KEYS_URL);
                if (!response.ok) throw new Error('Không thể tải keys.json');
                keysData = await response.json();
                return true;
            } catch (error) {
                console.error('Lỗi tải keys:', error);
                return false;
            }
        }

        // ===== TẠO KEY NGẪU NHIÊN =====
        function generateKey() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let key = 'KEY-';
            for (let i = 0; i < 10; i++) {
                key += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return key;
        }

        // ===== LƯU KEY =====
        function saveKey(key) {
            keyData = {
                key: key,
                date: getToday(),
                hour: getCurrentHourMinute()
            };
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(keyData));
            } catch (e) {}
        }

        // ===== ĐỌC KEY =====
        function loadKey() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return null;
                return JSON.parse(raw);
            } catch (e) {
                return null;
            }
        }

        // ===== KIỂM TRA KEY CÓ HỢP LỆ TRONG GIỜ HIỆN TẠI =====
        function isKeyValid() {
            const saved = loadKey();
            if (!saved) return false;

            const today = getToday();
            const currentHour = getCurrentHourMinute();

            // Kiểm tra ngày và giờ
            if (saved.date !== today) return false;
            if (saved.hour !== currentHour) return false;

            return true;
        }

        // ===== KIỂM TRA CÓ KEY TRONG FILE JSON CHO NGÀY HÔM NAY =====
        function hasKeyForToday() {
            if (!keysData) return false;
            const today = getToday();
            return keysData[today] && keysData[today].length > 0;
        }

        // ===== HIỂN THỊ TRẠNG THÁI =====
        function updateStatus(message, type = 'normal') {
            const map = {
                'normal': message,
                'success': '<span class="success">' + message + '</span>',
                'error': '<span class="error">' + message + '</span>',
                'highlight': '<span class="highlight">' + message + '</span>',
            };
            statusMsg.innerHTML = map[type] || message;
        }

        // ===== HIỂN THỊ KEY =====
        function showKey(key, isNew = false) {
            keyValue.textContent = key;
            keyDisplay.classList.remove('hidden');

            if (isNew) {
                getKeyBtn.textContent = '✅ Đã nhận key';
                getKeyBtn.disabled = true;
                getKeyBtn.className = 'btn btn-success';
                updateStatus('✅ Đã nhận key thành công!', 'success');
            } else {
                getKeyBtn.textContent = '✅ Đã nhận key';
                getKeyBtn.disabled = true;
                getKeyBtn.className = 'btn btn-success';
                updateStatus('📌 Key của bạn.', 'highlight');
            }
            copyHint.textContent = '💡 Click vào key để copy';
        }

        // ===== XỬ LÝ KHI CHƯA CÓ KEY =====
        function handleNoKey() {
            keyDisplay.classList.add('hidden');

            if (!keysData) {
                getKeyBtn.textContent = '🔄 Đang tải...';
                getKeyBtn.disabled = true;
                getKeyBtn.className = 'btn';
                updateStatus('⏳ Đang tải dữ liệu key...', 'normal');
                return;
            }

            if (!hasKeyForToday()) {
                getKeyBtn.textContent = '🚫 Không có key';
                getKeyBtn.disabled = true;
                getKeyBtn.className = 'btn btn-secondary';
                updateStatus('❌ Không có key nào hoạt động cho ngày hôm nay.', 'error');
                copyHint.textContent = '⏰ Vui lòng quay lại sau.';
                return;
            }

            getKeyBtn.textContent = '🎯 Get Key';
            getKeyBtn.disabled = false;
            getKeyBtn.className = 'btn';
            updateStatus('🔄 Nhấn "Get Key" để nhận key.', 'highlight');
            copyHint.textContent = '💡 Click vào key để copy';
        }

        // ===== COPY KEY =====
        keyDisplay.addEventListener('click', function() {
            const key = keyValue.textContent;
            if (!key) return;

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(key).then(() => {
                    copyHint.textContent = '✅ Đã copy key!';
                    setTimeout(() => {
                        copyHint.textContent = '💡 Click vào key để copy';
                    }, 2000);
                }).catch(() => {
                    copyFallback(key);
                });
            } else {
                copyFallback(key);
            }
        });

        function copyFallback(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.cssText = 'position:fixed;opacity:0;';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                copyHint.textContent = '✅ Đã copy key!';
                setTimeout(() => {
                    copyHint.textContent = '💡 Click vào key để copy';
                }, 2000);
            } catch (e) {}
            document.body.removeChild(textarea);
        }

        // ===== CẬP NHẬT ĐỒNG HỒ ĐẾM NGƯỢC =====
        function updateCountdown() {
            const now = new Date();
            const nextHour = getNextHourReset();
            const nextMidnight = getNextMidnight();

            // Nếu còn ít hơn 5 phút đến 00:00 thì ưu tiên hiển thị reset ngày
            const diffToMidnight = nextMidnight - now;
            const diffToHour = nextHour - now;

            let targetTime;
            let label;

            if (diffToMidnight < 600000) { // 10 phút đến 00:00
                targetTime = nextMidnight;
                label = 'Reset ngày mới lúc';
            } else {
                targetTime = nextHour;
                label = 'Key mới lúc';
            }

            const diff = targetTime - now;
            const hours = Math.floor(diff / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            const timeStr = String(hours).padStart(2, '0') + ':' +
                String(minutes).padStart(2, '0') + ':' +
                String(seconds).padStart(2, '0');

            const hourStr = String(targetTime.getHours()).padStart(2, '0') + ':' +
                String(targetTime.getMinutes()).padStart(2, '0');

            nextResetTime.textContent = hourStr + ' (' + timeStr + ')';
        }

        // ===== XỬ LÝ BẤM NÚT GET KEY =====
        getKeyBtn.addEventListener('click', function() {
            if (!keysData) {
                handleNoKey();
                return;
            }

            if (!hasKeyForToday()) {
                handleNoKey();
                return;
            }

            if (isKeyValid()) {
                const saved = loadKey();
                if (saved) showKey(saved.key, false);
                return;
            }

            // Tạo key mới
            const newKey = generateKey();
            saveKey(newKey);
            showKey(newKey, true);
        });

        // ===== KHỞI TẠO TRANG =====
        async function init() {
            // Tải keys.json
            await loadKeysData();

            // Kiểm tra key đã lưu
            if (isKeyValid()) {
                const saved = loadKey();
                if (saved) showKey(saved.key, false);
                else handleNoKey();
            } else {
                // Xóa key cũ nếu hết hạn
                if (loadKey()) {
                    localStorage.removeItem(STORAGE_KEY);
                }
                handleNoKey();
            }

            // Cập nhật đồng hồ đếm ngược
            updateCountdown();
            setInterval(updateCountdown, 1000);

            // Kiểm tra reset mỗi phút
            setInterval(function() {
                const saved = loadKey();
                if (saved && (saved.date !== getToday() || saved.hour !== getCurrentHourMinute())) {
                    localStorage.removeItem(STORAGE_KEY);
                    handleNoKey();
                }
            }, 60000);

            // Tải lại keys.json mỗi 10 phút
            setInterval(async function() {
                const success = await loadKeysData();
                if (success) {
                    if (!hasKeyForToday()) {
                        handleNoKey();
                    }
                }
            }, 600000);
        }

        init();
    </script>

</body>
</html>
