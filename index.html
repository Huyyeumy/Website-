<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔑 BEAR KEY SYSTEM - LẤY KEY</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0a1a, #1a1a3e);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 36px; background: linear-gradient(135deg, #6c63ff, #ff6b6b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { color: #888; margin-top: 5px; font-size: 14px; }
        
        .stats {
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .stats span { color: #888; font-size: 14px; }
        .stats strong { color: white; font-size: 18px; }
        .stats .total strong { color: #6c63ff; }
        .stats .active strong { color: #51cf66; }
        
        .date-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
            justify-content: center;
            padding: 10px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
        }
        .date-selector button {
            padding: 8px 16px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: white;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .date-selector button:hover { background: rgba(108,99,255,0.3); transform: translateY(-2px); }
        .date-selector button.active { background: #6c63ff; border-color: #6c63ff; box-shadow: 0 4px 15px rgba(108,99,255,0.3); }
        .date-selector button.today { border-color: #51cf66; }
        .date-selector button.today.active { background: #51cf66; border-color: #51cf66; }
        
        .key-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
            max-height: 500px;
            overflow-y: auto;
            padding: 5px;
        }
        .key-grid::-webkit-scrollbar { width: 6px; }
        .key-grid::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        .key-grid::-webkit-scrollbar-thumb { background: #6c63ff; border-radius: 10px; }
        
        .key-item {
            padding: 12px 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            text-align: center;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.3s;
            cursor: pointer;
            user-select: none;
        }
        .key-item:hover { transform: scale(1.05); background: rgba(108,99,255,0.2); border-color: #6c63ff; box-shadow: 0 4px 20px rgba(108,99,255,0.2); }
        .key-item:active { transform: scale(0.95); }
        .key-item .key-code { font-weight: bold; font-size: 14px; letter-spacing: 0.5px; }
        .key-item .key-status { font-size: 10px; margin-top: 4px; display: block; }
        .key-item .key-status.available { color: #51cf66; }
        .key-item .key-status.used { color: #ff6b6b; }
        .key-item.used { opacity: 0.4; border-color: #ff6b6b; }
        .key-item .copy-hint { font-size: 10px; color: #666; margin-top: 2px; display: block; }
        
        .empty-state { text-align: center; padding: 60px 20px; color: #666; grid-column: 1 / -1; }
        .empty-state .icon { font-size: 64px; margin-bottom: 15px; }
        .loading-state { text-align: center; padding: 60px 20px; color: #888; grid-column: 1 / -1; }
        .loading-state .spinner { display: inline-block; width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #6c63ff; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .api-info {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .api-info .label { color: #888; font-size: 12px; }
        .api-link-box {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 6px;
            margin-top: 5px;
            word-break: break-all;
            font-family: monospace;
            font-size: 12px;
            color: #6c63ff;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            background: #6c63ff;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn-danger { background: #ff6b6b; }
        .btn-danger:hover { background: #ff4444; }
        .btn-success { background: #51cf66; }
        .btn-success:hover { background: #40c057; }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 9999;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
        .toast.success { border-left: 4px solid #51cf66; }
        .toast.error { border-left: 4px solid #ff6b6b; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔑 BEAR KEY SYSTEM</h1>
            <p>📅 Key mới mỗi ngày - Click vào key để copy</p>
        </div>

        <div class="stats">
            <span class="total">📊 Tổng key: <strong id="totalKeys">0</strong></span>
            <span class="active">🟢 Còn trống: <strong id="availableKeys">0</strong></span>
            <span class="expired">🔴 Đã dùng: <strong id="usedKeys">0</strong></span>
        </div>

        <div class="date-selector" id="dateSelector">
            <!-- Nút ngày sẽ được tạo từ JavaScript -->
        </div>

        <div style="display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap;">
            <button class="btn btn-success" onclick="refreshKeys()">🔄 Refresh</button>
            <button class="btn" onclick="copyAllKeys()">📋 Copy tất cả</button>
        </div>

        <div id="keyGrid" class="key-grid">
            <div class="loading-state">
                <div class="spinner"></div>
                <p style="margin-top: 15px;">Đang tải danh sách key...</p>
            </div>
        </div>

        <div class="api-info">
            <div class="label">🔗 API cho Roblox (kiểm tra key):</div>
            <div class="api-link-box" id="apiLink">Đang tải...</div>
            <button class="btn" onclick="copyApiLink()" style="margin-top: 10px;">📋 Copy</button>
        </div>
    </div>

    <!-- Toast thông báo -->
    <div id="toast" class="toast"></div>

    <script>
        // ===== CẤU HÌNH =====
        const KEYS_URL = 'https://raw.githubusercontent.com/Huyyeumy/Website-/refs/heads/main/Keys.json';
        let keysData = {};
        let currentDate = '';
        let usedKeys = JSON.parse(localStorage.getItem('used_keys') || '{}');

        // ===== HIỂN THỊ TOAST =====
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show ' + type;
            setTimeout(() => { toast.className = 'toast'; }, 3000);
        }

        // ===== LƯU KEY ĐÃ DÙNG =====
        function saveUsedKeys() {
            localStorage.setItem('used_keys', JSON.stringify(usedKeys));
