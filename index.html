<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            text-align: center;
        }
        .lock-icon {
            font-size: 64px;
            margin-bottom: 20px;
            display: block;
        }
        h1 {
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 15px;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            padding: 16px 32px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            width: 100%;
            color: #0a0a1a;
            background: linear-gradient(135deg, #facc15, #f59e0b);
            box-shadow: 0 4px 15px rgba(250, 204, 21, 0.3);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(250, 204, 21, 0.4);
        }
        .btn:active {
            transform: scale(0.98);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        .btn-success {
            background: linear-gradient(135deg, #4ade80, #22c55e);
            box-shadow: 0 4px 15px rgba(74, 222, 128, 0.3);
        }
        .btn-success:hover {
            box-shadow: 0 8px 25px rgba(74, 222, 128, 0.4);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: none;
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            box-shadow: none;
        }
        .key-display {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 14px;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
            font-size: 18px;
            font-weight: 600;
            color: #facc15;
            border: 1px dashed rgba(250, 204, 21, 0.3);
            word-break: break-all;
            user-select: all;
        }
        .key-display .label {
            display: block;
            font-size: 12px;
            color: #94a3b8;
            font-family: 'Segoe UI', system-ui, sans-serif;
            font-weight: 400;
            margin-bottom: 6px;
        }
        .hidden {
            display: none !important;
        }
        .copy-hint {
            font-size: 12px;
            color: #64748b;
            margin-top: 8px;
        }
        .status-msg {
            font-size: 14px;
            color: #94a3b8;
            margin: 15px 0;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }
        .status-msg .highlight {
            color: #facc15;
            font-weight: 600;
        }
        .status-msg .success {
            color: #4ade80;
            font-weight: 600;
        }
        .status-msg .error {
            color: #f87171;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">
        <span class="lock-icon">🔑</span>
        <h1>KEY SYSTEM</h1>
        <p class="subtitle">Nhấn nút bên dưới để nhận key</p>

        <div id="statusMsg" class="status-msg">
            ⏳ Đang kiểm tra...
        </div>

        <div id="keyDisplay" class="key-display hidden">
            <span class="label">🔑 KEY CỦA BẠN</span>
            <span id="keyValue"></span>
        </div>

        <button id="getKeyBtn" class="btn">
            🎯 Get Key
        </button>

        <div class="copy-hint" id="copyHint">💡 Click vào key để copy</div>
    </div>

    <script>
        // ===== DOM =====
        const getKeyBtn = document.getElementById('getKeyBtn');
        const keyDisplay = document.getElementById('keyDisplay');
        const keyValue = document.getElementById('keyValue');
        const copyHint = document.getElementById('copyHint');
        const statusMsg = document.getElementById('statusMsg');

        // ===== CẤU HÌNH =====
        const STORAGE_KEY = 'daily_key_data';
        const KEYS_URL = 'https://raw.githubusercontent.com/Huyyeumy/Website-/refs/heads/main/Keys.json';

        // ===== STATE =====
        let keysData = null;
        let currentKeyIndex = 0; // Vị trí key đã lấy

        // ===== LẤY NGÀY HIỆN TẠI =====
        function getToday() {
            return new Date().toISOString().split('T')[0];
        }

        // ===== LẤY GIỜ HIỆN TẠI (giờ:phút) =====
        function getCurrentHourMinute() {
            const now = new Date();
            return now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0');
        }

        // ===== LẤY KEY TỪ FILE JSON =====
        async function loadKeysData() {
            try {
                const response = await fetch(KEYS_URL);
                if (!response.ok) throw new Error('Không thể tải keys.json');
                keysData = await response.json();
                return true;
            } catch (error) {
                console.error('Lỗi tải keys:', error);
                return false;
            }
        }

        // ===== LẤY DANH SÁCH KEY CHO NGÀY HÔM NAY =====
        function getKeysForToday() {
            if (!keysData) return null;
            const today = getToday();
            return keysData[today] || null;
        }

        // ===== LẤY KEY CHƯA DÙNG TRONG NGÀY =====
        function getAvailableKey() {
            const keys = getKeysForToday();
            if (!keys || keys.length === 0) return null;

            // Lấy danh sách key đã dùng
            const usedKeys = JSON.parse(localStorage.getItem('used_keys_' + getToday()) || '[]');

            // Tìm key chưa dùng
            for (const key of keys) {
                if (!usedKeys.includes(key)) {
                    return key;
                }
            }

            return null; // Hết key
        }

        // ===== ĐÁNH DẤU KEY ĐÃ DÙNG =====
        function markKeyUsed(key) {
            const today = getToday();
            const usedKeys = JSON.parse(localStorage.getItem('used_keys_' + today) || '[]');
            if (!usedKeys.includes(key)) {
                usedKeys.push(key);
                localStorage.setItem('used_keys_' + today, JSON.stringify(usedKeys));
            }
        }

        // ===== KIỂM TRA KEY ĐÃ DÙNG CHƯA =====
        function isKeyUsed(key) {
            const today = getToday();
            const usedKeys = JSON.parse(localStorage.getItem('used_keys_' + today) || '[]');
            return usedKeys.includes(key);
        }

        // ===== HIỂN THỊ TRẠNG THÁI =====
        function updateStatus(message, type = 'normal') {
            const map = {
                'normal': message,
                'success': '<span class="success">' + message + '</span>',
                'error': '<span class="error">' + message + '</span>',
                'highlight': '<span class="highlight">' + message + '</span>',
            };
            statusMsg.innerHTML = map[type] || message;
        }

        // ===== HIỂN THỊ KEY =====
        function showKey(key, isNew = false) {
            keyValue.textContent = key;
            keyDisplay.classList.remove('hidden');

            if (isNew) {
                getKeyBtn.textContent = '✅ Đã nhận key';
                getKeyBtn.disabled = true;
                getKeyBtn.className = 'btn btn-success';
                updateStatus('✅ Đã nhận key thành công!', 'success');
            } else {
                getKeyBtn.textContent = '✅ Đã nhận key';
                getKeyBtn.disabled = true;
                getKeyBtn.className = 'btn btn-success';
                updateStatus('📌 Key của bạn.', 'highlight');
            }
            copyHint.textContent = '💡 Click vào key để copy';
        }

        // ===== XỬ LÝ KHI CHƯA CÓ KEY =====
        function handleNoKey(message) {
            keyDisplay.classList.add('hidden');

            if (!keysData) {
                getKeyBtn.textContent = '🔄 Đang tải...';
                getKeyBtn.disabled = true;
                getKeyBtn.className = 'btn';
                updateStatus('⏳ Đang tải dữ liệu key...', 'normal');
                return;
            }

            const keys = getKeysForToday();
            if (!keys || keys.length === 0) {
                getKeyBtn.textContent = '🚫 Không có key';
                getKeyBtn.disabled = true;
                getKeyBtn.className = 'btn btn-secondary';
                updateStatus('❌ Không có key nào cho ngày hôm nay.', 'error');
                copyHint.textContent = '⏰ Vui lòng quay lại sau.';
                return;
            }

            // Kiểm tra còn key không
            const availableKey = getAvailableKey();
            if (!availableKey) {
                getKeyBtn.textContent = '🚫 Hết key';
                getKeyBtn.disabled = true;
                getKeyBtn.className = 'btn btn-secondary';
                updateStatus('❌ Đã hết key cho ngày hôm nay.', 'error');
                copyHint.textContent = '⏰ Vui lòng quay lại ngày mai.';
                return;
            }

            getKeyBtn.textContent = '🎯 Get Key';
            getKeyBtn.disabled = false;
            getKeyBtn.className = 'btn';
            updateStatus('🔄 Nhấn "Get Key" để nhận key.', 'highlight');
            copyHint.textContent = '💡 Click vào key để copy';
        }

        // ===== COPY KEY =====
        keyDisplay.addEventListener('click', function() {
            const key = keyValue.textContent;
            if (!key) return;

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(key).then(() => {
                    copyHint.textContent = '✅ Đã copy key!';
                    setTimeout(() => {
                        copyHint.textContent = '💡 Click vào key để copy';
                    }, 2000);
                }).catch(() => {
                    copyFallback(key);
                });
            } else {
                copyFallback(key);
            }
        });

        function copyFallback(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.cssText = 'position:fixed;opacity:0;';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                copyHint.textContent = '✅ Đã copy key!';
                setTimeout(() => {
                    copyHint.textContent = '💡 Click vào key để copy';
                }, 2000);
            } catch (e) {}
            document.body.removeChild(textarea);
        }

        // ===== XỬ LÝ BẤM NÚT GET KEY =====
        getKeyBtn.addEventListener('click', function() {
            if (!keysData) {
                handleNoKey();
                return;
            }

            const keys = getKeysForToday();
            if (!keys || keys.length === 0) {
                handleNoKey();
                return;
            }

            // Lấy key chưa dùng
            const availableKey = getAvailableKey();
            if (!availableKey) {
                handleNoKey();
                return;
            }

            // Đánh dấu key đã dùng
            markKeyUsed(availableKey);
            showKey(availableKey, true);
        });

        // ===== KHỞI TẠO TRANG =====
        async function init() {
            await loadKeysData();

            // Kiểm tra xem đã nhận key trong giờ này chưa
            const saved = localStorage.getItem('received_key_' + getToday() + '_' + getCurrentHourMinute());
            if (saved) {
                const keyData = JSON.parse(saved);
                if (!isKeyUsed(keyData.key)) {
                    showKey(keyData.key, false);
                } else {
                    handleNoKey();
                }
            } else {
                handleNoKey();
            }

            // Reset mỗi giờ
            setInterval(function() {
                const today = getToday();
                const hour = getCurrentHourMinute();
                const saved = localStorage.getItem('received_key_' + today + '_' + hour);
                if (!saved) {
                    // Chưa có key trong giờ này
                    handleNoKey();
                }
            }, 60000);

            // Tải lại keys.json mỗi 10 phút
            setInterval(async function() {
                const success = await loadKeysData();
                if (success) {
                    const keys = getKeysForToday();
                    if (!keys || keys.length === 0) {
                        handleNoKey();
                    }
                }
            }, 600000);
        }

        // Lưu key đã nhận vào localStorage khi hiển thị
        const originalShowKey = showKey;
        showKey = function(key, isNew = false) {
            if (isNew) {
                const today = getToday();
                const hour = getCurrentHourMinute();
                localStorage.setItem('received_key_' + today + '_' + hour, JSON.stringify({ key: key }));
            }
            originalShowKey(key, isNew);
        };

        init();
    </script>

</body>
</html>
