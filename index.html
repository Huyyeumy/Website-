<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .lock-icon { font-size: 64px; margin-bottom: 20px; display: block; }
        h1 { color: #fff; font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .subtitle { color: #94a3b8; font-size: 15px; margin-bottom: 30px; }
        
        .btn {
            display: inline-block; padding: 16px 32px; border: none; border-radius: 12px;
            font-size: 18px; font-weight: 600; cursor: pointer; transition: all 0.3s ease;
            text-decoration: none; width: 100%; color: #0a0a1a;
            background: linear-gradient(135deg, #facc15, #f59e0b);
            box-shadow: 0 4px 15px rgba(250, 204, 21, 0.3);
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(250, 204, 21, 0.4); }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
        .btn-success { background: linear-gradient(135deg, #4ade80, #22c55e); box-shadow: 0 4px 15px rgba(74, 222, 128, 0.3); }
        .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.15); box-shadow: none; }
        .btn-secondary:hover { background: rgba(255,255,255,0.15); box-shadow: none; }
        
        .key-display {
            background: rgba(0,0,0,0.3); border-radius: 12px; padding: 14px; margin: 20px 0;
            font-family: 'Courier New', monospace; font-size: 18px; font-weight: 600;
            color: #facc15; border: 1px dashed rgba(250,204,21,0.3); word-break: break-all;
            user-select: all;
        }
        .key-display .label { display: block; font-size: 12px; color: #94a3b8; font-family: 'Segoe UI', system-ui, sans-serif; font-weight: 400; margin-bottom: 6px; }
        .hidden { display: none !important; }
        .copy-hint { font-size: 12px; color: #64748b; margin-top: 8px; }
        
        .status-msg {
            font-size: 14px;
            color: #94a3b8;
            margin: 15px 0;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            border-left: 3px solid #64748b;
        }
        .status-msg.success { border-left-color: #4ade80; color: #4ade80; }
        .status-msg.error { border-left-color: #f87171; color: #f87171; }
        .status-msg.warning { border-left-color: #facc15; color: #facc15; }
        .status-msg.info { border-left-color: #60a5fa; color: #60a5fa; }
        
        .debug-box {
            margin-top: 15px;
            padding: 12px;
            background: rgba(0,0,0,0.4);
            border-radius: 8px;
            text-align: left;
            font-size: 12px;
            font-family: 'Courier New', monospace;
            color: #94a3b8;
            line-height: 1.8;
        }
        .debug-box .label { color: #64748b; }
        .debug-box .value { color: #facc15; }
        .debug-box .error-text { color: #f87171; }
        .debug-box .success-text { color: #4ade80; }
    </style>
</head>
<body>

    <div class="container">
        <span class="lock-icon">🔑</span>
        <h1>KEY SYSTEM</h1>
        <p class="subtitle">Nhấn nút bên dưới để nhận key</p>

        <div id="statusMsg" class="status-msg">
            ⏳ Đang kiểm tra...
        </div>

        <div id="keyDisplay" class="key-display hidden">
            <span class="label">🔑 KEY CỦA BẠN</span>
            <span id="keyValue"></span>
        </div>

        <button id="getKeyBtn" class="btn">
            🎯 Get Key
        </button>

        <div class="copy-hint" id="copyHint">💡 Click vào key để copy</div>

        <div id="debugBox" class="debug-box">
            <div><span class="label">📂 Đường dẫn:</span> <span class="value" id="debugPath">--</span></div>
            <div><span class="label">📅 Ngày hôm nay:</span> <span class="value" id="debugToday">--</span></div>
            <div><span class="label">📋 Trạng thái:</span> <span id="debugStatus">⏳ Đang tải...</span></div>
            <div id="debugError" style="display:none;"><span class="label">❌ Lỗi:</span> <span class="error-text" id="debugErrorText"></span></div>
            <div id="debugKeys" style="display:none;"><span class="label">🔑 Key trong ngày:</span> <span class="value" id="debugKeysCount">0</span></div>
        </div>
    </div>

    <script>
        // ===== DOM =====
        const getKeyBtn = document.getElementById('getKeyBtn');
        const keyDisplay = document.getElementById('keyDisplay');
        const keyValue = document.getElementById('keyValue');
        const copyHint = document.getElementById('copyHint');
        const statusMsg = document.getElementById('statusMsg');
        const debugPath = document.getElementById('debugPath');
        const debugToday = document.getElementById('debugToday');
        const debugStatus = document.getElementById('debugStatus');
        const debugError = document.getElementById('debugError');
        const debugErrorText = document.getElementById('debugErrorText');
        const debugKeys = document.getElementById('debugKeys');
        const debugKeysCount = document.getElementById('debugKeysCount');

        // ===== CẤU HÌNH =====
        // Link raw GitHub của Keys.json
        const KEYS_URL = 'https://raw.githubusercontent.com/Huyyeumy/Website-/refs/heads/main/Keys.json';

        // ===== KEY MẪU DỰ PHÒNG (NẾU KHÔNG TẢI ĐƯỢC) =====
        const FALLBACK_KEYS = {
            "2026-06-22": [
                "FREE_A1B2C3D4E5",
                "FREE_F6G7H8I9J0",
                "FREE_K1L2M3N4O5",
                "FREE_P6Q7R8S9T0",
                "FREE_U1V2W3X4Y5",
                "FREE_Z6A7B8C9D0",
                "FREE_E1F2G3H4I5",
                "FREE_J6K7L8M9N0",
                "FREE_O1P2Q3R4S5",
                "FREE_T6U7V8W9X0"
            ],
            "2026-06-23": [
                "FREE_W1X2Y3Z4A5",
                "FREE_B6C7D8E9F0",
                "FREE_G1H2I3J4K5",
                "FREE_L6M7N8O9P0",
                "FREE_Q1R2S3T4U5"
            ]
        };

        // ===== STATE =====
        let keysData = null;
        let fileLoaded = false;
        let loadError = null;
        let usingFallback = false;

        // ===== LẤY NGÀY HIỆN TẠI =====
        function getToday() {
            return new Date().toISOString().split('T')[0];
        }

        // ===== LẤY GIỜ HIỆN TẠI =====
        function getCurrentHour() {
            return new Date().getHours();
        }

        // ===== CẬP NHẬT DEBUG =====
        function updateDebug(status, error = null, keysCount = null) {
            debugPath.textContent = KEYS_URL;
            debugToday.textContent = getToday();
            debugStatus.textContent = status || 'Đang tải...';

            if (error) {
                debugError.style.display = 'block';
                debugErrorText.textContent = error;
            } else {
                debugError.style.display = 'none';
            }

            if (keysCount !== null) {
                debugKeys.style.display = 'block';
                debugKeysCount.textContent = keysCount;
            } else {
                debugKeys.style.display = 'none';
            }
        }

        // ===== CẬP NHẬT TRẠNG THÁI =====
        function updateStatus(message, type = 'info') {
            statusMsg.textContent = message;
            statusMsg.className = 'status-msg ' + type;
        }

        // ===== LẤY KEY TỪ FILE JSON =====
        async function loadKeysData() {
            try {
                updateDebug('⏳ Đang tải từ GitHub...');
                updateStatus('⏳ Đang tải dữ liệu key từ GitHub...', 'info');
                console.log('🔄 Đang tải Keys.json từ GitHub...');

                const response = await fetch(KEYS_URL, {
                    cache: 'no-cache',
                    headers: { 'Accept': 'application/json' }
                });

                if (!response.ok) {
                    throw new Error('HTTP ' + response.status + ' - ' + response.statusText);
                }

                const text = await response.text();
                console.log('📄 Nội dung file:', text.substring(0, 200) + '...');

                if (!text || text.trim() === '' || text.trim() === '{}') {
                    throw new Error('File Keys.json rỗng');
                }

                keysData = JSON.parse(text);
                fileLoaded = true;
                loadError = null;
                usingFallback = false;

                const totalKeys = Object.keys(keysData).length;
                const todayKeys = keysData[getToday()] ? keysData[getToday()].length : 0;

                console.log('✅ Đã tải Keys.json thành công!');
                console.log('📋 Tổng số ngày có key:', totalKeys);

                updateDebug('✅ Đã tải thành công (GitHub)', null, todayKeys);
                updateStatus('✅ Đã tải dữ liệu key thành công!', 'success');
                return true;
            } catch (error) {
                console.error('❌ Lỗi tải từ GitHub:', error.message);

                // DÙNG KEY MẪU DỰ PHÒNG
                console.log('⚠️ Chuyển sang dùng key mẫu dự phòng...');
                keysData = FALLBACK_KEYS;
                fileLoaded = true;
                loadError = null;
                usingFallback = true;

                const todayKeys = keysData[getToday()] ? keysData[getToday()].length : 0;
                updateDebug('⚠️ Đang dùng key mẫu (không tải được GitHub)', 'Không tải được từ GitHub, dùng key mẫu', todayKeys);
                updateStatus('⚠️ Đang dùng key mẫu dự phòng (không tải được từ GitHub)', 'warning');
                return true;
            }
        }

        // ===== KIỂM TRA CÓ KEY CHO NGÀY HÔM NAY =====
        function hasKeysForToday() {
            if (!keysData) return false;
            const today = getToday();

            if (typeof keysData !== 'object' || Array.isArray(keysData)) {
                return false;
            }

            const keys = keysData[today];
            if (keys && Array.isArray(keys) && keys.length > 0) {
                return true;
            }

            return false;
        }

        // ===== LẤY KEY CHO NGÀY HÔM NAY =====
        function getKeysForToday() {
            if (!keysData) return null;
            const today = getToday();

            if (keysData[today] && Array.isArray(keysData[today]) && keysData[today].length > 0) {
                return keysData[today];
            }

            return null;
        }

        // ===== LẤY KEY CHƯA DÙNG =====
        function getAvailableKey() {
            const keys = getKeysForToday();
            if (!keys || keys.length === 0) return null;

            const usedKeys = JSON.parse(localStorage.getItem('used_keys_' + getToday()) || '[]');
            const today = getToday();
            const hour = getCurrentHour();

            const receivedKey = localStorage.getItem('received_key_' + today + '_' + hour);

            if (receivedKey) {
                try {
                    const data = JSON.parse(receivedKey);
                    if (data && data.key && !usedKeys.includes(data.key)) {
                        return data.key;
                    }
                } catch (e) {}
            }

            for (const key of keys) {
                if (!usedKeys.includes(key)) {
                    return key;
                }
            }

            return null;
        }

        // ===== ĐÁNH DẤU KEY ĐÃ DÙNG =====
        function markKeyUsed(key) {
            const today = getToday();
            const usedKeys = JSON.parse(localStorage.getItem('used_keys_' + today) || '[]');
            if (!usedKeys.includes(key)) {
                usedKeys.push(key);
                localStorage.setItem('used_keys_' + today, JSON.stringify(usedKeys));
            }

            const hour = getCurrentHour();
            localStorage.setItem('received_key_' + today + '_' + hour, JSON.stringify({ key: key }));
        }

        // ===== KIỂM TRA KEY ĐÃ DÙNG =====
        function isKeyUsed(key) {
            const today = getToday();
            const usedKeys = JSON.parse(localStorage.getItem('used_keys_' + today) || '[]');
            return usedKeys.includes(key);
        }

        // ===== HIỂN THỊ KEY =====
        function showKey(key, isNew = false) {
            keyValue.textContent = key;
            keyDisplay.classList.remove('hidden');

            if (isNew) {
                getKeyBtn.textContent = '✅ Đã nhận key';
                getKeyBtn.disabled = true;
                getKeyBtn.className = 'btn btn-success';
                updateStatus('✅ Đã nhận key thành công!', 'success');
            } else {
                getKeyBtn.textContent = '✅ Đã nhận key';
                getKeyBtn.disabled = true;
                getKeyBtn.className = 'btn btn-success';
                updateStatus('📌 Key của bạn.', 'info');
            }
            copyHint.textContent = '💡 Click vào key để copy';
        }

        // ===== XỬ LÝ KHI CHƯA CÓ KEY =====
        function handleNoKey() {
            keyDisplay.classList.add('hidden');

            if (!fileLoaded) {
                getKeyBtn.textContent = '🔄 Đang tải...';
                getKeyBtn.disabled = true;
                getKeyBtn.className = 'btn';
                updateStatus('⏳ Đang tải dữ liệu key...', 'info');
                return;
            }

            if (loadError) {
                getKeyBtn.textContent = '⚠️ Lỗi tải';
                getKeyBtn.disabled = true;
                getKeyBtn.className = 'btn btn-secondary';
                updateStatus('❌ Lỗi: ' + loadError, 'error');
                return;
            }

            if (!keysData || Object.keys(keysData).length === 0) {
                getKeyBtn.textContent = '⚠️ Chưa có key';
                getKeyBtn.disabled = true;
                getKeyBtn.className = 'btn btn-secondary';
                updateStatus('❌ Chưa có key nào trong hệ thống.', 'error');
                return;
            }

            if (!hasKeysForToday()) {
                const today = getToday();
                getKeyBtn.textContent = '📅 Chưa có key';
                getKeyBtn.disabled = true;
                getKeyBtn.className = 'btn btn-secondary';
                updateStatus('❌ Chưa có key cho ngày ' + today + '.', 'error');
                copyHint.textContent = '📅 Vui lòng quay lại vào ngày khác.';
                return;
            }

            const availableKey = getAvailableKey();
            if (!availableKey) {
                getKeyBtn.textContent = '🚫 Hết key';
                getKeyBtn.disabled = true;
                getKeyBtn.className = 'btn btn-secondary';
                updateStatus('❌ Đã hết key cho ngày hôm nay.', 'error');
                copyHint.textContent = '⏰ Vui lòng quay lại ngày mai.';
                return;
            }

            getKeyBtn.textContent = '🎯 Get Key';
            getKeyBtn.disabled = false;
            getKeyBtn.className = 'btn';
            updateStatus('🔄 Nhấn "Get Key" để nhận key.', 'warning');
            copyHint.textContent = '💡 Click vào key để copy';
        }

        // ===== COPY KEY =====
        keyDisplay.addEventListener('click', function() {
            const key = keyValue.textContent;
            if (!key) return;

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(key).then(() => {
                    copyHint.textContent = '✅ Đã copy key!';
                    setTimeout(() => {
                        copyHint.textContent = '💡 Click vào key để copy';
                    }, 2000);
                }).catch(() => {
                    copyFallback(key);
                });
            } else {
                copyFallback(key);
            }
        });

        function copyFallback(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.cssText = 'position:fixed;opacity:0;';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                copyHint.textContent = '✅ Đã copy key!';
                setTimeout(() => {
                    copyHint.textContent = '💡 Click vào key để copy';
                }, 2000);
            } catch (e) {}
            document.body.removeChild(textarea);
        }

        // ===== XỬ LÝ BẤM NÚT GET KEY =====
        getKeyBtn.addEventListener('click', function() {
            if (!fileLoaded || loadError) {
                handleNoKey();
                return;
            }

            if (!keysData || Object.keys(keysData).length === 0) {
                handleNoKey();
                return;
            }

            if (!hasKeysForToday()) {
                handleNoKey();
                return;
            }

            const availableKey = getAvailableKey();
            if (!availableKey) {
                handleNoKey();
                return;
            }

            if (isKeyUsed(availableKey)) {
                handleNoKey();
                return;
            }

            markKeyUsed(availableKey);
            showKey(availableKey, true);
        });

        // ===== KHỞI TẠO TRANG =====
        async function init() {
            debugToday.textContent = getToday();
            await loadKeysData();

            const today = getToday();
            const hour = getCurrentHour();
            const saved = localStorage.getItem('received_key_' + today + '_' + hour);

            if (saved && fileLoaded && keysData && hasKeysForToday()) {
                try {
                    const keyData = JSON.parse(saved);
                    if (keyData && keyData.key && !isKeyUsed(keyData.key)) {
                        showKey(keyData.key, false);
                        return;
                    }
                } catch (e) {}
            }

            handleNoKey();

            setInterval(function() {
                const currentHour = getCurrentHour();
                const today = getToday();
                const savedKey = localStorage.getItem('received_key_' + today + '_' + currentHour);

                if (!savedKey) {
                    handleNoKey();
                } else {
                    try {
                        const data = JSON.parse(savedKey);
                        if (data && data.key && isKeyUsed(data.key)) {
                            handleNoKey();
                        }
                    } catch (e) {}
                }
            }, 60000);

            setInterval(async function() {
                await loadKeysData();
                if (!hasKeysForToday() || !keysData || Object.keys(keysData).length === 0) {
                    handleNoKey();
                }
            }, 300000);
        }

        init();
    </script>

</body>
</html>
