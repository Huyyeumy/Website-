<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔑 BEAR KEY SYSTEM - LẤY KEY</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0a1a, #1a1a3e);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 36px; background: linear-gradient(135deg, #6c63ff, #ff6b6b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { color: #888; margin-top: 5px; font-size: 14px; }
        
        .stats {
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .stats span { color: #888; font-size: 14px; }
        .stats strong { color: white; font-size: 18px; }
        .stats .total strong { color: #6c63ff; }
        .stats .active strong { color: #51cf66; }
        .stats .used strong { color: #ff6b6b; }
        
        .date-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
            justify-content: center;
            padding: 10px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            max-height: 150px;
            overflow-y: auto;
        }
        .date-selector button {
            padding: 8px 16px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: white;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .date-selector button:hover { background: rgba(108,99,255,0.3); transform: translateY(-2px); }
        .date-selector button.active { background: #6c63ff; border-color: #6c63ff; box-shadow: 0 4px 15px rgba(108,99,255,0.3); }
        .date-selector button.today { border-color: #51cf66; }
        .date-selector button.today.active { background: #51cf66; border-color: #51cf66; }
        
        .key-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
            max-height: 500px;
            overflow-y: auto;
            padding: 5px;
        }
        .key-grid::-webkit-scrollbar { width: 6px; }
        .key-grid::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        .key-grid::-webkit-scrollbar-thumb { background: #6c63ff; border-radius: 10px; }
        
        .key-item {
            padding: 12px 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            text-align: center;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.3s;
            cursor: pointer;
            user-select: none;
        }
        .key-item:hover { transform: scale(1.05); background: rgba(108,99,255,0.2); border-color: #6c63ff; box-shadow: 0 4px 20px rgba(108,99,255,0.2); }
        .key-item:active { transform: scale(0.95); }
        .key-item .key-code { font-weight: bold; font-size: 14px; letter-spacing: 0.5px; }
        .key-item .key-status { font-size: 10px; margin-top: 4px; display: block; }
        .key-item .key-status.available { color: #51cf66; }
        .key-item .key-status.used { color: #ff6b6b; }
        .key-item.used { opacity: 0.4; border-color: #ff6b6b; }
        .key-item .copy-hint { font-size: 10px; color: #666; margin-top: 2px; display: block; }
        
        .empty-state { text-align: center; padding: 60px 20px; color: #666; grid-column: 1 / -1; }
        .empty-state .icon { font-size: 64px; margin-bottom: 15px; }
        .loading-state { text-align: center; padding: 60px 20px; color: #888; grid-column: 1 / -1; }
        .loading-state .spinner { display: inline-block; width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #6c63ff; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 9999;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
        .toast.success { border-left: 4px solid #51cf66; }
        .toast.error { border-left: 4px solid #ff6b6b; }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            background: #6c63ff;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn-success { background: #51cf66; }
        .btn-success:hover { background: #40c057; }
        .btn-danger { background: #ff6b6b; }
        .btn-danger:hover { background: #ff4444; }
        
        .api-info {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .api-info .label { color: #888; font-size: 12px; }
        .api-link-box {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 6px;
            margin-top: 5px;
            word-break: break-all;
            font-family: monospace;
            font-size: 12px;
            color: #6c63ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔑 BEAR KEY SYSTEM</h1>
            <p>📅 Key mới mỗi ngày - Click vào key để copy</p>
        </div>

        <div class="stats">
            <span class="total">📊 Tổng key: <strong id="totalKeys">0</strong></span>
            <span class="active">🟢 Còn trống: <strong id="availableKeys">0</strong></span>
            <span class="used">🔴 Đã dùng: <strong id="usedKeys">0</strong></span>
        </div>

        <div class="date-selector" id="dateSelector">
            <!-- Nút ngày sẽ được tạo từ JavaScript -->
        </div>

        <div style="display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap;">
            <button class="btn btn-success" onclick="refreshKeys()">🔄 Refresh</button>
            <button class="btn btn-danger" onclick="resetAllKeys()">🗑️ Reset tất cả</button>
        </div>

        <div id="keyGrid" class="key-grid">
            <div class="loading-state">
                <div class="spinner"></div>
                <p style="margin-top:15px;">Đang tải danh sách key...</p>
            </div>
        </div>

        <div class="api-info">
            <div class="label">🔗 API cho Roblox (kiểm tra key):</div>
            <div class="api-link-box" id="apiLink">Đang tải...</div>
            <button class="btn" onclick="copyApiLink()" style="margin-top: 10px;">📋 Copy</button>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // ===== CẤU HÌNH =====
        // Đọc file Keys.json cùng thư mục
        const KEYS_URL = 'Keys.json';
        let keysData = {};
        let currentDate = '';
        let usedKeys = JSON.parse(localStorage.getItem('used_keys') || '{}');

        // ===== HIỂN THỊ TOAST =====
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show ' + type;
            setTimeout(() => { toast.className = 'toast'; }, 3000);
        }

        // ===== LƯU KEY ĐÃ DÙNG =====
        function saveUsedKeys() {
            localStorage.setItem('used_keys', JSON.stringify(usedKeys));
        }

        // ===== ĐÁNH DẤU KEY ĐÃ DÙNG =====
        function markKeyUsed(date, key) {
            if (!usedKeys[date]) usedKeys[date] = [];
            if (!usedKeys[date].includes(key)) {
                usedKeys[date].push(key);
                saveUsedKeys();
                loadKeys(currentDate);
            }
        }

        // ===== KIỂM TRA KEY ĐÃ DÙNG CHƯA =====
        function isKeyUsed(date, key) {
            return usedKeys[date] && usedKeys[date].includes(key);
        }

        // ===== TẢI DỮ LIỆU KEY TỪ FILE JSON =====
        async function loadKeysData() {
            try {
                const response = await fetch(KEYS_URL);
                if (!response.ok) throw new Error('Không thể tải keys.json');
                keysData = await response.json();
                return true;
            } catch (error) {
                console.error('Lỗi tải keys:', error);
                return false;
            }
        }

        // ===== LẤY DANH SÁCH NGÀY =====
        function getAvailableDates() {
            return Object.keys(keysData).sort();
        }

        // ===== TẠO NÚT CHỌN NGÀY =====
        function createDateButtons() {
            const container = document.getElementById('dateSelector');
            const dates = getAvailableDates();
            const today = new Date().toISOString().split('T')[0];
            
            container.innerHTML = '';
            
            dates.forEach(date => {
                const btn = document.createElement('button');
                btn.textContent = date;
                btn.dataset.date = date;
                if (date === today) btn.classList.add('today');
                if (date === currentDate || (!currentDate && date === today)) {
                    btn.classList.add('active');
                    if (!currentDate) currentDate = date;
                }
                btn.onclick = () => {
                    document.querySelectorAll('.date-selector button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentDate = date;
                    loadKeys(date);
                };
                container.appendChild(btn);
            });
        }

        // ===== HIỂN THỊ KEY =====
        function loadKeys(date) {
            const grid = document.getElementById('keyGrid');
            
            if (!date || !keysData[date]) {
                grid.innerHTML = `<div class="empty-state"><div class="icon">📅</div><p>Không có key cho ngày này</p></div>`;
                updateStats(0, 0, 0);
                return;
            }

            const keys = keysData[date];
            let total = keys.length;
            let available = 0;
            let used = 0;

            let html = '';
            keys.forEach(key => {
                const isUsed = isKeyUsed(date, key);
                if (isUsed) used++;
                else available++;
                
                html += `
                    <div class="key-item ${isUsed ? 'used' : ''}" onclick="copyKey('${date}', '${key}')" title="Click để copy">
                        <div class="key-code">${key}</div>
                        <span class="key-status ${isUsed ? 'used' : 'available'}">${isUsed ? '🔴 Đã dùng' : '🟢 Còn trống'}</span>
                        <span class="copy-hint">📋 Click để copy</span>
                    </div>
                `;
            });

            grid.innerHTML = html;
            updateStats(total, available, used);
        }

        // ===== CẬP NHẬT THỐNG KÊ =====
        function updateStats(total, available, used) {
            document.getElementById('totalKeys').textContent = total || 0;
            document.getElementById('availableKeys').textContent = available || 0;
            document.getElementById('usedKeys').textContent = used || 0;
        }

        // ===== COPY KEY =====
        function copyKey(date, key) {
            if (isKeyUsed(date, key)) {
                showToast('⚠️ Key này đã được sử dụng!', 'error');
                return;
            }

            if (navigator.clipboard) {
                navigator.clipboard.writeText(key).then(() => {
                    showToast('✅ Đã copy: ' + key, 'success');
                    markKeyUsed(date, key);
                }).catch(() => {
                    showToast('⚠️ Không thể copy!', 'error');
                });
            } else {
                const textarea = document.createElement('textarea');
                textarea.value = key;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('✅ Đã copy: ' + key, 'success');
                markKeyUsed(date, key);
            }
        }

        // ===== REFRESH =====
        async function refreshKeys() {
            const grid = document.getElementById('keyGrid');
            grid.innerHTML = `<div class="loading-state"><div class="spinner"></div><p style="margin-top:15px;">Đang tải lại...</p></div>`;
            
            const success = await loadKeysData();
            if (success) {
                createDateButtons();
                loadKeys(currentDate);
                updateApiLink();
                showToast('✅ Đã refresh thành công!', 'success');
            } else {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">❌</div>
                        <p>Không thể tải dữ liệu key!</p>
                        <p style="font-size:12px;color:#666;">Vui lòng kiểm tra file Keys.json</p>
                        <button class="btn" onclick="refreshKeys()" style="margin-top:15px;">🔄 Thử lại</button>
                    </div>
                `;
                showToast('❌ Lỗi tải dữ liệu!', 'error');
            }
        }

        // ===== RESET TẤT CẢ KEY =====
        function resetAllKeys() {
            if (confirm('⚠️ Xóa tất cả key đã dùng?')) {
                usedKeys = {};
                saveUsedKeys();
                loadKeys(currentDate);
                showToast('✅ Đã reset tất cả!', 'success');
            }
        }

        // ===== API LINK =====
        function updateApiLink() {
            const link = window.location.href.split('?')[0] + '?key=YOUR_KEY_HERE';
            document.getElementById('apiLink').textContent = link;
        }

        function copyApiLink() {
            const link = document.getElementById('apiLink').textContent;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(link);
                showToast('📋 Đã copy link API!', 'success');
            }
        }

        // ===== XỬ LÝ API CHO ROBLOX =====
        (async function() {
            const urlParams = new URLSearchParams(window.location.search);
            const checkKey = urlParams.get('key');
            
            if (checkKey) {
                await loadKeysData();
                const today = new Date().toISOString().split('T')[0];
                let result = 'invalid';
                let foundDate = '';
                
                // Kiểm tra key trong tất cả các ngày
                for (const [date, keys] of Object.entries(keysData)) {
                    if (keys.includes(checkKey)) {
                        foundDate = date;
                        // Kiểm tra key chưa dùng
                        if (!isKeyUsed(date, checkKey)) {
                            result = 'valid';
                            // Đánh dấu key đã dùng
                            markKeyUsed(date, checkKey);
                        }
                        break;
                    }
                }
                
                document.body.innerHTML = result;
                document.body.style.display = 'flex';
                document.body.style.justifyContent = 'center';
                document.body.style.alignItems = 'center';
                document.body.style.height = '100vh';
                document.body.style.background = '#0a0a1a';
                document.body.style.color = result === 'valid' ? '#51cf66' : '#ff6b6b';
                document.body.style.fontSize = '32px';
                document.body.style.fontFamily = 'monospace';
                document.body.style.fontWeight = 'bold';
                return;
            }
        })();

        // ===== KHỞI TẠO =====
        async function init() {
            const success = await loadKeysData();
            if (success) {
                const today = new Date().toISOString().split('T')[0];
                currentDate = today;
                createDateButtons();
                loadKeys(currentDate);
                updateApiLink();
            } else {
                document.getElementById('keyGrid').innerHTML = `
                    <div class="empty-state">
                        <div class="icon">❌</div>
                        <p>Không thể tải dữ liệu key!</p>
                        <p style="font-size:12px;color:#666;">Vui lòng kiểm tra file Keys.json</p>
                        <button class="btn" onclick="refreshKeys()" style="margin-top:15px;">🔄 Thử lại</button>
                    </div>
                `;
            }
        }

        init();
    </script>
</body>
</html>
