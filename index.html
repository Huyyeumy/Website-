<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key System - Bear Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .lock-icon { font-size: 64px; margin-bottom: 20px; display: block; }
        h1 { color: #fff; font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .subtitle { color: #94a3b8; font-size: 15px; margin-bottom: 30px; }
        
        .status-box {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .status-box .label { color: #94a3b8; font-size: 13px; text-transform: uppercase; margin-bottom: 4px; }
        .status-box .value { color: #fff; font-size: 22px; font-weight: 600; }
        .status-box .value .highlight { color: #facc15; }
        .status-box .value .success { color: #4ade80; }
        .status-box .value .error { color: #f87171; }
        
        .btn {
            display: inline-block; padding: 14px 32px; border: none; border-radius: 12px;
            font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease;
            text-decoration: none; width: 100%; color: #0a0a1a;
        }
        .btn-primary { background: linear-gradient(135deg, #facc15, #f59e0b); box-shadow: 0 4px 15px rgba(250,204,21,0.3); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(250,204,21,0.4); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
        .btn-success { background: linear-gradient(135deg, #4ade80, #22c55e); box-shadow: 0 4px 15px rgba(74,222,128,0.3); color: #0a0a1a; }
        .btn-success:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(74,222,128,0.4); }
        
        .key-display {
            background: rgba(0,0,0,0.3); border-radius: 12px; padding: 14px; margin: 20px 0;
            font-family: 'Courier New', monospace; font-size: 18px; font-weight: 600;
            color: #facc15; border: 1px dashed rgba(250,204,21,0.3); word-break: break-all;
        }
        .timer {
            font-size: 14px;
            color: #94a3b8;
            margin-top: 15px;
        }
        .timer span { color: #facc15; font-weight: 600; }
        .footer { margin-top: 25px; font-size: 12px; color: #475569; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="container" id="app">
        <span class="lock-icon">🔑</span>
        <h1>BEAR KEY SYSTEM</h1>
        <p class="subtitle">Nhận key truy cập độc quyền</p>

        <div class="status-box">
            <div class="label">Trạng thái</div>
            <div class="value" id="statusText">
                <span class="highlight">⏳</span> Đang kiểm tra...
            </div>
        </div>

        <div id="keyDisplay" class="key-display hidden"></div>

        <button id="actionBtn" class="btn btn-primary" disabled>
            Đang tải...
        </button>

        <div class="timer" id="timerDisplay">
            ⏰ Key mới sau: <span id="countdown">--:--</span>
        </div>

        <div class="footer">
            <span>🔒 Mỗi lần tải lại trang sẽ có key mới</span>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ----- CẤU HÌNH -----
            const CONFIG = {
                TARGET_URL: 'https://link4sub.com/DaPSaLCo2S',
                KEY_DURATION: 3600000, // 1 giờ = 3600000 ms
            };

            // ----- DOM -----
            const statusText = document.getElementById('statusText');
            const keyDisplay = document.getElementById('keyDisplay');
            const actionBtn = document.getElementById('actionBtn');
            const countdownEl = document.getElementById('countdown');

            let keyData = null;
            let timerInterval = null;

            // ----- UTILITY -----
            function updateStatus(text, type = 'normal') {
                const map = {
                    'normal': text,
                    'success': '<span class="success">' + text + '</span>',
                    'error': '<span class="error">' + text + '</span>',
                    'highlight': '<span class="highlight">' + text + '</span>',
                };
                statusText.innerHTML = map[type] || text;
            }

            function setButton(text, disabled = false, className = 'btn-primary') {
                actionBtn.textContent = text;
                actionBtn.disabled = disabled;
                actionBtn.className = 'btn ' + className;
            }

            function displayKey(key) {
                keyDisplay.textContent = key;
                keyDisplay.classList.remove('hidden');
            }
            function hideKey() { keyDisplay.classList.add('hidden'); }

            function showTimer(seconds) {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                countdownEl.textContent = String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
            }

            // ----- GENERATE KEY -----
            function generateKey() {
                const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
                let key = 'KEY-';
                for (let i = 0; i < 10; i++) {
                    key += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                return key;
            }

            // ----- SESSION -----
            function saveKeyToSession(key) {
                keyData = { value: key, timestamp: Date.now() };
                try { sessionStorage.setItem('bear_key_data', JSON.stringify(keyData)); } catch (e) {}
            }

            function loadKeyFromSession() {
                try {
                    const raw = sessionStorage.getItem('bear_key_data');
                    if (!raw) return null;
                    const data = JSON.parse(raw);
                    if (data && data.value && data.timestamp) return data;
                    return null;
                } catch (e) { return null; }
            }

            function clearKeyFromSession() {
                try { sessionStorage.removeItem('bear_key_data'); } catch (e) {}
                keyData = null;
            }

            function isKeyValid(data) {
                if (!data) return false;
                return (Date.now() - data.timestamp) < CONFIG.KEY_DURATION;
            }

            function getRemainingTime(data) {
                if (!data) return 0;
                const elapsed = Date.now() - data.timestamp;
                const remaining = CONFIG.KEY_DURATION - elapsed;
                return Math.max(0, Math.floor(remaining / 1000));
            }

            // ----- MAIN LOGIC -----
            function handleNoValidKey() {
                hideKey();
                clearKeyFromSession();
                updateStatus('🔄 Sẵn sàng lấy key mới', 'highlight');
                setButton('🎯 Get Key', false, 'btn-primary');
                showTimer(0);
                if (timerInterval) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                }
            }

            function handleValidKey(keyVal, remainingSeconds) {
                displayKey(keyVal);
                updateStatus('🔑 Key đã sẵn sàng', 'success');
                setButton('📋 Copy Key & Tiếp tục', false, 'btn-success');
                showTimer(remainingSeconds);

                // Đếm ngược
                if (timerInterval) clearInterval(timerInterval);
                let seconds = remainingSeconds;
                timerInterval = setInterval(() => {
                    seconds--;
                    if (seconds <= 0) {
                        clearInterval(timerInterval);
                        timerInterval = null;
                        // Key hết hạn, reset
                        handleNoValidKey();
                    } else {
                        showTimer(seconds);
                    }
                }, 1000);
            }

            function resetState() {
                if (timerInterval) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                }
                clearKeyFromSession();
                handleNoValidKey();
            }

            function handleAction() {
                const currentText = actionBtn.textContent;

                if (currentText.includes('Get Key')) {
                    const newKey = generateKey();
                    saveKeyToSession(newKey);
                    handleValidKey(newKey, Math.floor(CONFIG.KEY_DURATION / 1000));
                    setTimeout(() => {
                        window.location.href = CONFIG.TARGET_URL;
                    }, 1500);
                    return;
                }

                if (currentText.includes('Copy Key')) {
                    const key = keyData ? keyData.value : null;
                    if (key) {
                        if (navigator.clipboard && navigator.clipboard.writeText) {
                            navigator.clipboard.writeText(key).catch(() => { copyFallback(key); });
                        } else {
                            copyFallback(key);
                        }
                        setTimeout(() => {
                            window.location.href = CONFIG.TARGET_URL;
                        }, 500);
                    } else {
                        resetState();
                    }
                    return;
                }
                resetState();
            }

            function copyFallback(text) {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.cssText = 'position:fixed;opacity:0;';
                document.body.appendChild(textarea);
                textarea.select();
                try { document.execCommand('copy'); } catch (e) {}
                document.body.removeChild(textarea);
            }

            // ----- INIT -----
            function init() {
                const saved = loadKeyFromSession();

                if (saved && isKeyValid(saved)) {
                    const remaining = getRemainingTime(saved);
                    handleValidKey(saved.value, remaining);
                } else {
                    if (saved) clearKeyFromSession();
                    handleNoValidKey();
                }

                actionBtn.addEventListener('click', handleAction);

                // Khi trang được tải lại (hoặc focus lại), kiểm tra lại key
                document.addEventListener('visibilitychange', function() {
                    if (!document.hidden) {
                        const saved = loadKeyFromSession();
                        if (saved && isKeyValid(saved)) {
                            const remaining = getRemainingTime(saved);
                            handleValidKey(saved.value, remaining);
                        } else {
                            if (saved) clearKeyFromSession();
                            handleNoValidKey();
                        }
                    }
                });
            }

            init();

        })();
    </script>

</body>
</html>
