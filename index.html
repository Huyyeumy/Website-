<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            text-align: center;
        }
        .lock-icon { font-size: 64px; margin-bottom: 20px; display: block; }
        h1 { color: #fff; font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .subtitle { color: #94a3b8; font-size: 15px; margin-bottom: 30px; }
        
        .btn {
            display: inline-block; padding: 16px 32px; border: none; border-radius: 12px;
            font-size: 18px; font-weight: 600; cursor: pointer; transition: all 0.3s ease;
            text-decoration: none; width: 100%; color: #0a0a1a;
            background: linear-gradient(135deg, #facc15, #f59e0b);
            box-shadow: 0 4px 15px rgba(250, 204, 21, 0.3);
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(250, 204, 21, 0.4); }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
        .btn-success { background: linear-gradient(135deg, #4ade80, #22c55e); box-shadow: 0 4px 15px rgba(74, 222, 128, 0.3); }
        .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.15); box-shadow: none; }
        
        .key-display {
            background: rgba(0,0,0,0.3); border-radius: 12px; padding: 14px; margin: 20px 0;
            font-family: 'Courier New', monospace; font-size: 18px; font-weight: 600;
            color: #facc15; border: 1px dashed rgba(250,204,21,0.3); word-break: break-all;
            user-select: all;
        }
        .key-display .label { display: block; font-size: 12px; color: #94a3b8; font-weight: 400; margin-bottom: 6px; }
        .hidden { display: none !important; }
        .copy-hint { font-size: 12px; color: #64748b; margin-top: 8px; }
        
        .status-msg {
            font-size: 14px; color: #94a3b8; margin: 15px 0; padding: 12px;
            background: rgba(255,255,255,0.05); border-radius: 8px; border-left: 3px solid #64748b;
        }
        .status-msg.success { border-left-color: #4ade80; color: #4ade80; }
        .status-msg.error { border-left-color: #f87171; color: #f87171; }
        .status-msg.warning { border-left-color: #facc15; color: #facc15; }
        
        .debug-box {
            margin-top: 15px; padding: 12px; background: rgba(0,0,0,0.4); border-radius: 8px;
            text-align: left; font-size: 12px; font-family: 'Courier New', monospace;
            color: #94a3b8; line-height: 1.8;
        }
        .debug-box .label { color: #64748b; }
        .debug-box .value { color: #facc15; }
        .debug-box .error-text { color: #f87171; }
    </style>
</head>
<body>

    <div class="container">
        <span class="lock-icon">🔑</span>
        <h1>KEY SYSTEM</h1>
        <p class="subtitle">Nhấn nút bên dưới để nhận key</p>

        <div id="statusMsg" class="status-msg">⏳ Đang kiểm tra...</div>

        <div id="keyDisplay" class="key-display hidden">
            <span class="label">🔑 KEY CỦA BẠN</span>
            <span id="keyValue"></span>
        </div>

        <button id="getKeyBtn" class="btn">🎯 Get Key</button>
        <div class="copy-hint" id="copyHint">💡 Click vào key để copy</div>

        <div id="debugBox" class="debug-box">
            <div><span class="label">📂 Đường dẫn:</span> <span class="value" id="debugPath">Keys.json</span></div>
            <div><span class="label">📅 Ngày hôm nay:</span> <span class="value" id="debugToday">--</span></div>
            <div><span class="label">📋 Trạng thái:</span> <span id="debugStatus">⏳ Đang tải...</span></div>
            <div id="debugKeys" style="display:none;"><span class="label">🔑 Key trong ngày:</span> <span class="value" id="debugKeysCount">0</span></div>
        </div>
    </div>

    <script>
        // ===== DOM =====
        const getKeyBtn = document.getElementById('getKeyBtn');
        const keyDisplay = document.getElementById('keyDisplay');
        const keyValue = document.getElementById('keyValue');
        const copyHint = document.getElementById('copyHint');
        const statusMsg = document.getElementById('statusMsg');
        const debugPath = document.getElementById('debugPath');
        const debugToday = document.getElementById('debugToday');
        const debugStatus = document.getElementById('debugStatus');
        const debugKeys = document.getElementById('debugKeys');
        const debugKeysCount = document.getElementById('debugKeysCount');

        // ===== CẤU HÌNH =====
        const KEYS_URL = 'Keys.json';

        // ===== STATE =====
        let keysData = null;
        let fileLoaded = false;
        let loadError = null;

        // ===== LẤY NGÀY HIỆN TẠI =====
        function getToday() {
            return new Date().toISOString().split('T')[0];
        }

        // ===== LẤY GIỜ HIỆN TẠI =====
        function getCurrentHour() {
            return new Date().getHours();
        }

        // ===== CẬP NHẬT DEBUG =====
        function updateDebug(status, keysCount = null) {
            debugToday.textContent = getToday();
            debugStatus.textContent = status || 'Đang tải...';
            if (keysCount !== null) {
                debugKeys.style.display = 'block';
                debugKeysCount.textContent = keysCount;
            }
        }

        // ===== CẬP NHẬT TRẠNG THÁI =====
        function updateStatus(message, type = 'warning') {
            statusMsg.textContent = message;
            statusMsg.className = 'status-msg ' + type;
        }

        // ===== LẤY KEY TỪ FILE JSON =====
        async function loadKeysData() {
            try {
                debugPath.textContent = KEYS_URL;
                updateDebug('⏳ Đang tải...');
                updateStatus('⏳ Đang tải dữ liệu key...', 'warning');

                const response = await fetch(KEYS_URL, {
                    cache: 'no-cache',
                    headers: { 'Accept': 'application/json' }
                });

                if (!response.ok) {
                    throw new Error('HTTP ' + response.status);
                }

                const text = await response.text();
                if (!text || text.trim() === '' || text.trim() === '{}') {
                    throw new Error('File Keys.json rỗng');
                }

                keysData = JSON.parse(text);
                fileLoaded = true;
                loadError = null;

                const todayKeys = keysData[getToday()] ? keysData[getToday()].length : 0;
                updateDebug('✅ Đã tải thành công', todayKeys);
                updateStatus('✅ Đã tải dữ liệu key thành công!', 'success');
                return true;
            } catch (error) {
                keysData = null;
                fileLoaded = false;
                loadError = error.message;
                updateDebug('❌ Lỗi: ' + error.message);
                updateStatus('❌ Lỗi: ' + error.message, 'error');
                return false;
            }
        }

        // ===== KIỂM TRA CÓ KEY CHO NGÀY HÔM NAY =====
        function hasKeysForToday() {
            if (!keysData) return false;
            const today = getToday();
            const keys = keysData[today];
            return keys && Array.isArray(keys) && keys.length > 0;
        }

        // ===== LẤY KEY CHO NGÀY HÔM NAY =====
        function getKeysForToday() {
            if (!keysData) return null;
            const today = getToday();
            return (keysData[today] && Array.isArray(keysData[today]) && keysData[today].length > 0) 
                ? keysData[today] 
                : null;
        }

        // ===== LẤY KEY CHƯA DÙNG =====
        function getAvailableKey() {
            const keys = getKeysForToday();
            if (!keys || keys.length === 0) return null;

            const usedKeys = JSON.parse(localStorage.getItem('used_keys_' + getToday()) || '[]');
            const receivedKey = localStorage.getItem('received_key_' + getToday() + '_' + getCurrentHour());

            if (receivedKey) {
                try {
                    const data = JSON.parse(receivedKey);
                    if (data && data.key && !usedKeys.includes(data.key)) {
                        return data.key;
                    }
                } catch (e) {}
            }

            for (const key of keys) {
                if (!usedKeys.includes(key)) {
                    return key;
                }
            }
            return null;
        }

        // ===== ĐÁNH DẤU KEY ĐÃ DÙNG =====
        function markKeyUsed(key) {
            const today = getToday();
            const usedKeys = JSON.parse(localStorage.getItem('used_keys_' + today) || '[]');
            if (!usedKeys.includes(key)) {
                usedKeys.push(key);
                localStorage.setItem('used_keys_' + today, JSON.stringify(usedKeys));
            }
            localStorage.setItem('received_key_' + today + '_' + getCurrentHour(), JSON.stringify({ key: key }));
        }

        // ===== HIỂN THỊ KEY =====
        function showKey(key, isNew = false) {
            keyValue.textContent = key;
            keyDisplay.classList.remove('hidden');
            if (isNew) {
                getKeyBtn.textContent = '✅ Đã nhận key';
                getKeyBtn.disabled = true;
                getKeyBtn.className = 'btn btn-success';
                updateStatus('✅ Đã nhận key thành công!', 'success');
            } else {
                getKeyBtn.textContent = '✅ Đã nhận key';
                getKeyBtn.disabled = true;
                getKeyBtn.className = 'btn btn-success';
                updateStatus('📌 Key của bạn.', 'success');
            }
            copyHint.textContent = '💡 Click vào key để copy';
        }

        // ===== XỬ LÝ KHI CHƯA CÓ KEY =====
        function handleNoKey() {
            keyDisplay.classList.add('hidden');

            if (!fileLoaded) {
                getKeyBtn.textContent = '🔄 Đang tải...';
                getKeyBtn.disabled = true;
                getKeyBtn.className = 'btn';
                updateStatus('⏳ Đang tải dữ liệu key...', 'warning');
                return;
            }

            if (loadError) {
                getKeyBtn.textContent = '⚠️ Lỗi tải';
                getKeyBtn.disabled = true;
                getKeyBtn.className = 'btn btn-secondary';
                updateStatus('❌ Lỗi: ' + loadError, 'error');
                return;
            }

            if (!keysData || Object.keys(keysData).length === 0) {
                getKeyBtn.textContent = '⚠️ Chưa có key';
                getKeyBtn.disabled = true;
                getKeyBtn.className = 'btn btn-secondary';
                updateStatus('❌ Chưa có key nào trong hệ thống.', 'error');
                return;
            }

            if (!hasKeysForToday()) {
                getKeyBtn.textContent = '📅 Chưa có key';
                getKeyBtn.disabled = true;
                getKeyBtn.className = 'btn btn-secondary';
                updateStatus('❌ Chưa có key cho ngày ' + getToday(), 'error');
                return;
            }

            const availableKey = getAvailableKey();
            if (!availableKey) {
                getKeyBtn.textContent = '🚫 Hết key';
                getKeyBtn.disabled = true;
                getKeyBtn.className = 'btn btn-secondary';
                updateStatus('❌ Đã hết key cho ngày hôm nay.', 'error');
                return;
            }

            getKeyBtn.textContent = '🎯 Get Key';
            getKeyBtn.disabled = false;
            getKeyBtn.className = 'btn';
            updateStatus('🔄 Nhấn "Get Key" để nhận key.', 'warning');
            copyHint.textContent = '💡 Click vào key để copy';
        }

        // ===== COPY KEY =====
        keyDisplay.addEventListener('click', function() {
            const key = keyValue.textContent;
            if (!key) return;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(key).then(() => {
                    copyHint.textContent = '✅ Đã copy key!';
                    setTimeout(() => { copyHint.textContent = '💡 Click vào key để copy'; }, 2000);
                }).catch(() => { copyFallback(key); });
            } else {
                copyFallback(key);
            }
        });

        function copyFallback(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.cssText = 'position:fixed;opacity:0;';
            document.body.appendChild(textarea);
            textarea.select();
            try { document.execCommand('copy'); } catch (e) {}
            document.body.removeChild(textarea);
            copyHint.textContent = '✅ Đã copy key!';
            setTimeout(() => { copyHint.textContent = '💡 Click vào key để copy'; }, 2000);
        }

        // ===== XỬ LÝ BẤM NÚT GET KEY =====
        getKeyBtn.addEventListener('click', function() {
            if (!fileLoaded || loadError || !keysData || !hasKeysForToday()) {
                handleNoKey();
                return;
            }
            const availableKey = getAvailableKey();
            if (!availableKey) { handleNoKey(); return; }
            markKeyUsed(availableKey);
            showKey(availableKey, true);
        });

        // ===== KHỞI TẠO TRANG =====
        async function init() {
            debugToday.textContent = getToday();
            await loadKeysData();

            const saved = localStorage.getItem('received_key_' + getToday() + '_' + getCurrentHour());
            if (saved && fileLoaded && keysData && hasKeysForToday()) {
                try {
                    const keyData = JSON.parse(saved);
                    if (keyData && keyData.key) {
                        showKey(keyData.key, false);
                        return;
                    }
                } catch (e) {}
            }
            handleNoKey();

            setInterval(() => {
                const savedKey = localStorage.getItem('received_key_' + getToday() + '_' + getCurrentHour());
                if (!savedKey) handleNoKey();
            }, 60000);
        }

        init();
    </script>

</body>
</html>
