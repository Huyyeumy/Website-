<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key System - Bear Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            text-align: center;
        }
        .lock-icon {
            font-size: 64px;
            margin-bottom: 20px;
            display: block;
        }
        h1 {
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 15px;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            padding: 16px 32px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            width: 100%;
            color: #0a0a1a;
            background: linear-gradient(135deg, #facc15, #f59e0b);
            box-shadow: 0 4px 15px rgba(250, 204, 21, 0.3);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(250, 204, 21, 0.4);
        }
        .btn:active {
            transform: scale(0.98);
        }
        .btn-success {
            background: linear-gradient(135deg, #4ade80, #22c55e);
            box-shadow: 0 4px 15px rgba(74, 222, 128, 0.3);
        }
        .btn-success:hover {
            box-shadow: 0 8px 25px rgba(74, 222, 128, 0.4);
        }
        .key-display {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 14px;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
            font-size: 18px;
            font-weight: 600;
            color: #facc15;
            border: 1px dashed rgba(250, 204, 21, 0.3);
            word-break: break-all;
            user-select: all;
        }
        .key-display .label {
            display: block;
            font-size: 12px;
            color: #94a3b8;
            font-family: 'Segoe UI', system-ui, sans-serif;
            font-weight: 400;
            margin-bottom: 6px;
        }
        .hidden {
            display: none !important;
        }
        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #475569;
        }
        .copy-hint {
            font-size: 12px;
            color: #64748b;
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <div class="container">
        <span class="lock-icon">🔑</span>
        <h1>BEAR KEY SYSTEM</h1>
        <p class="subtitle">Nhấn nút bên dưới để nhận key</p>

        <div id="keyDisplay" class="key-display hidden">
            <span class="label">🔑 KEY CỦA BẠN</span>
            <span id="keyValue"></span>
        </div>

        <button id="getKeyBtn" class="btn">
            🎯 Get Key
        </button>

        <div class="copy-hint" id="copyHint">💡 Click vào key để copy</div>

        <div class="footer">
            <span>🔒 Mỗi lần bấm sẽ tạo key mới</span>
        </div>
    </div>

    <script>
        // ===== DOM =====
        const getKeyBtn = document.getElementById('getKeyBtn');
        const keyDisplay = document.getElementById('keyDisplay');
        const keyValue = document.getElementById('keyValue');
        const copyHint = document.getElementById('copyHint');

        // ===== TẠO KEY NGẪU NHIÊN =====
        function generateKey() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let key = 'KEY-';
            for (let i = 0; i < 10; i++) {
                key += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return key;
        }

        // ===== HIỂN THỊ KEY =====
        function showKey(key) {
            keyValue.textContent = key;
            keyDisplay.classList.remove('hidden');
            getKeyBtn.textContent = '🔄 Tạo Key Mới';
            getKeyBtn.className = 'btn btn-success';
            copyHint.textContent = '💡 Click vào key để copy';
        }

        // ===== COPY KEY =====
        keyDisplay.addEventListener('click', function() {
            const key = keyValue.textContent;
            if (!key) return;

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(key).then(() => {
                    copyHint.textContent = '✅ Đã copy key!';
                    setTimeout(() => {
                        copyHint.textContent = '💡 Click vào key để copy';
                    }, 2000);
                }).catch(() => {
                    copyFallback(key);
                });
            } else {
                copyFallback(key);
            }
        });

        function copyFallback(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.cssText = 'position:fixed;opacity:0;';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                copyHint.textContent = '✅ Đã copy key!';
                setTimeout(() => {
                    copyHint.textContent = '💡 Click vào key để copy';
                }, 2000);
            } catch (e) {}
            document.body.removeChild(textarea);
        }

        // ===== XỬ LÝ BẤM NÚT =====
        getKeyBtn.addEventListener('click', function() {
            const newKey = generateKey();
            showKey(newKey);
        });

        // ===== TỰ ĐỘNG TẠO KEY LẦN ĐẦU =====
        window.addEventListener('load', function() {
            const firstKey = generateKey();
            showKey(firstKey);
        });
    </script>

</body>
</html>
